[workspace]

[package]
name = "asupersync-fuzz"
version = "0.0.0"
authors = ["Automated"]
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
asupersync = { path = "..", features = ["tls"] }
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

# Optional: for structured fuzzing
bytes = "1"
serde = { version = "1", features = ["derive"] }

# For SCRAM-SHA-256 parsing
base64 = "0.22"
sha2 = "0.10"

[dev-dependencies]
# For seed generation and corpus management
rand = "0.8"

# Fuzz targets - each [[bin]] entry defines a fuzz target
# Run with: cargo +nightly fuzz run <target_name>

[[bin]]
name = "fuzz_http1_request"
path = "fuzz_targets/http1_request.rs"
test = false
doc = false
bench = false

